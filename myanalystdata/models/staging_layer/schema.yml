version: 2

models:
  - name: stg_cities
    description: "staging reference data for cities."
    columns:
      - name: city_id
        data_type: int4
        description: "Primary key. Unique identifier for each city."
        tests:
          - not_null
          - unique

      - name: city_name
        data_type: string
        description: "Name of the city."
        tests:
          - not_null

      - name: country
        data_type: string
        description: "Country where the city operates."
        tests:
          - not_null

      - name: launch_date
        data_type: date
        description: "Date the city was launched on the platform."

     
  - name: stg_drivers
    description: "staging drivers reference data."
    columns:
      - name: driver_id
        data_type: int4
        description: "Primary key. Unique identifier for each driver."
        tests:
          - not_null
          - unique

      - name: city_id
        data_type: int4
        description: "Foreign key to stg_cities. City the driver is assigned to."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_cities')
                field: city_id

      - name: vehicle_id
        data_type: string
        description: "Current vehicle assigned to the driver."

      - name: driver_status
        data_type: string
        description: "Current lifecycle status of the driver."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'inactive', 'suspended']

      - name: rating
        data_type: numeric
        description: "Average driver rating between 0.0 and 5.0."

      - name: onboarding_date
        data_type: date
        description: "Date the driver completed onboarding."
        tests:
          - not_null

      - name: created_at
        data_type: timestamp
        description: "UTC timestamp when the driver record was created."
        tests:
          - not_null

      - name: updated_at
        data_type: timestamp
        description: "UTC timestamp of the most recent update to the driver record."
        tests:
          - not_null



  - name: stg_drivers_status_events
    description: "Cleaned event log of driver status transitions. One row per status change event."
    columns:
      - name: event_id
        data_type: int4
        description: "Primary key. Unique identifier for each status event."
        tests:
          - not_null
          - unique

      - name: driver_id
        data_type: int4
        description: "Foreign key to stg_drivers."
        data_tests:
            - not_null
            - relationships:
                arguments:
                  to: ref('stg_drivers')
                  field: driver_id

      - name: status
        data_type: string
        description: "Driver status captured at the time of the event."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['online', 'offline']

      - name: event_timestamp
        data_type: timestamp
        description: "UTC timestamp when the status change occurred."
        tests:
          - not_null


  - name: stg_riders
    description: "Cleaned and deduplicated rider registration data. One row per rider."
   
    columns:
      - name: rider_id
        data_type: int4
        description: "Primary key. Unique identifier for each rider."
        tests:
          - not_null
          - unique

      - name: country
        data_type: string
        description: "Country where the rider registered."
        tests:
          - not_null

      - name: signup_date
        data_type: date
        description: "Date the rider completed registration."
        tests:
          - not_null

      - name: referral_code
        data_type: string
        description: "Referral code used at signup. Nullable — not all riders use one."

      - name: created_at
        data_type: timestamp
        description: "UTC timestamp when the rider record was created."
        tests:
          - not_null


  - name: stg_payments
    description: "Cleaned and deduplicated payment records. One row per payment. Includes derived net_amount column."
    columns:
      - name: payment_id
        data_type: int4
        description: "Primary key. Unique identifier for each payment transaction."
        tests:
          - not_null
          - unique
          
      - name: trip_id
        data_type: int4
        description: "Foreign key to stg_trips."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_trips')
                field: trip_id

      - name: payment_status
        data_type: string
        description: "Outcome of the payment transaction."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['success', 'failed']

      - name: payment_provider
        data_type: string
        description: "External payment processor used to handle the transaction."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['stripe', 'paypal']

      - name: currency
        data_type: string
        description: "currency code for the transaction."
        tests:
          - not_null

      - name: amount
        data_type: numeric
        description: "Gross amount charged to the rider."
        tests:
          - not_null

      - name: fee
        data_type: numeric
        description: "Platform service fee deducted from the gross amount."
        tests:
          - not_null

      - name: created_at
        data_type: timestamp
        description: "UTC timestamp when the payment record was created."
        tests:
          - not_null



  - name: stg_trips
    description: "Cleaned and deduplicated trip records. One row per trip. All datetime fields standardized to UTC timestamps."
    columns:
      - name: trip_id
        data_type: int4
        description: "Primary key. Unique identifier for each trip."
        tests:
          - not_null
          - unique

      - name: rider_id
        data_type: int4
        description: "Foreign key to stg_riders."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_riders')
                field: rider_id

      - name: driver_id
        data_type: int4
        description: "Foreign key to stg_drivers."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_drivers')
                field: driver_id

      - name: city_id
        data_type: int4
        description: "Foreign key to stg_cities."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_cities')
                field: city_id

      - name: vehicle_id
        data_type: string
        description: "Vehicle used for the trip. Not unique at trip level — the same vehicle serves many trips."
        tests:
          - not_null

      - name: status
        data_type: string
        description: "Current state of the trip lifecycle."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['completed', 'cancelled', 'no_show']

      - name: payment_method
        data_type: string
        description: "Payment method selected by the rider."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['card', 'wallet', 'cash']

      - name: is_corporate
        data_type: boolean
        description: "True if the trip was booked under a corporate account."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: estimated_fare
        data_type: numeric
        description: "Fare estimate shown to the rider before the trip began."

      - name: actual_fare
        data_type: numeric
        description: "Final fare charged to the rider at trip completion."

      - name: surge_multiplier
        data_type: numeric
        description: "Demand-based multiplier applied to the base fare. Values above 10 are flagged as suspicious."

      - name: requested_at
        data_type: timestamp
        description: "UTC timestamp when the rider requested the trip."
        tests:
          - not_null

      - name: pickup_at
        data_type: timestamp
        description: "UTC timestamp when the driver picked up the rider."

      - name: dropoff_at
        data_type: timestamp
        description: "UTC timestamp when the rider was dropped off."

      - name: created_at
        data_type: timestamp
        description: "UTC timestamp when the trip record was created in the system."
        tests:
          - not_null

      - name: updated_at
        data_type: timestamp
        description: "UTC timestamp of the most recent update to the trip record."
        tests:
          - not_null

      